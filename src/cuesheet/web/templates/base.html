<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}cuesheet{% endblock %}</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
  <link rel="icon" type="image/png" sizes="64x64" href="/static/favicon.png">
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.7/dist/cdn.min.js" defer></script>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <a href="/" class="brand-link">
        <img src="/static/brand.png" alt="" class="brand-mark" width="32" height="32">
        <span class="brand-name">cuesheet</span>
      </a>
      <span class="brand-version">v{{ version }}</span>
      {% if live_enabled %}
        <span class="live-pill" id="live-indicator" title="Watching the filesystem for cassette changes">
          <span class="live-dot"></span>live
        </span>
      {% endif %}
    </div>
    <nav class="header-nav">
      <a href="https://github.com/gmoustakas/cuesheet" class="nav-link" rel="noopener" target="_blank">github ↗</a>
    </nav>
  </header>

  <main class="app-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="app-footer">
    <span class="footer-mono">{{ root }}</span>
    <span class="footer-mono">
      cuesheet · local · built by
      <a href="https://www.georgemou.gr/" rel="noopener" target="_blank" class="footer-link">george moustakas</a>
    </span>
  </footer>

  {% if live_enabled %}
  <script>
    // Live file-change listener. SSE pushes events; we refresh the relevant
    // section without a full page reload.
    (function() {
      const es = new EventSource("/events");
      const indicator = document.getElementById("live-indicator");

      function flash() {
        if (!indicator) return;
        indicator.classList.add("flash");
        setTimeout(() => indicator.classList.remove("flash"), 700);
      }

      es.addEventListener("connected", () => {
        if (indicator) indicator.classList.remove("stale");
      });

      es.addEventListener("ping", () => {
        // heartbeat
      });

      es.addEventListener("cassette_changed", (e) => {
        flash();
        const data = JSON.parse(e.data);
        // Tell every htmx-listening element to refresh
        window.dispatchEvent(new CustomEvent("cuesheet:cassette_changed", { detail: data }));
      });

      es.onerror = () => {
        if (indicator) indicator.classList.add("stale");
      };
    })();
  </script>
  {% endif %}
</body>
</html>
